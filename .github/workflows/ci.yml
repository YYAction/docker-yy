name: Log Scan CI

on:
  push:
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Check Python syntax
        working-directory: log-scan
        run: python -m py_compile log_scan.py

      - name: Build Docker image
        working-directory: log-scan
        run: docker build -t log-scan:test .

      - name: Run container smoke test
        working-directory: log-scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/log-scan/sample_logs:/logs:ro" \
            log-scan:test \
            --file /logs \
            --lines 500